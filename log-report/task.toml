artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a small Apache combined-style access log and compute exact summary statistics (request count, unique client IPs, most-requested path) with correct field extraction from the quoted request line."
solution_explanation = "Read /app/access.log line by line; count non-empty lines as requests, collect the first whitespace-separated field as the client IP set, and extract the request path from the quoted HTTP request line to find the most frequent path."
verification_explanation = "The verifier parses /app/report.json and deterministically asserts the exact values computed from the shipped log: total_requests == 6, unique_ips == 3, top_path == \"/index.html\" (the top path is unique in the data, so there is no tie-break ambiguity)."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
